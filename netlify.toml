[build]
  command = "npm install && npm run build:netlify"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"
  # Set these in Netlify → Site settings → Environment variables:
  #   SUPABASE_URL       ← your Supabase project URL
  #   SUPABASE_ANON_KEY  ← your Supabase anon public key

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
