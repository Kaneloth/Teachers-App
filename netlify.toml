[functions]
  node_bundler = "esbuild"

[functions."fetch-vacancies"]
  timeout = 26

[functions."convert-to-pdf"]
  timeout = 26
  memory = 1024

[functions."enhance-cv"]
  timeout = 26

[functions."grant-signup-credits"]
  timeout = 10

[functions."deduct-credits"]
  timeout = 10

[functions."purchase-credits"]
  timeout = 10

[functions."monthly-pro-credits"]
  timeout = 60
  schedule = "0 2 1 * *"

[functions."admin-list-users"]
  timeout = 15

[functions."admin-adjust-credits"]
  timeout = 10

[functions."admin-update-user"]
  timeout = 10

# Ensure the sitemap is served correctly (before the catch-all rule)
[[redirects]]
  from   = "/sitemap.xml"
  to     = "/sitemap.xml"
  status = 200
  force  = true

# SPA catch-all — must come LAST so Netlify functions still resolve first.
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
