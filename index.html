<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Crosssa – Educator Transfer & Career Platform</title>
    <meta name="description" content="Crosssa connects South African educators for school transfers and helps job seekers build professional CVs, cover letters, and find vacancies – all free." />
    <meta name="robots" content="index, follow" />
    <meta property="og:title" content="Crosssa" />
    <meta property="og:description" content="Find school transfer matches, build CVs, write cover letters, and discover jobs – one platform for educators and job seekers." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Crosssa" />
    <meta name="twitter:description" content="Find school transfer matches, build CVs, write cover letters, and discover jobs – one platform for educators and job seekers." />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0d9488" />
    
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .catch(err => console.warn('Service Worker registration failed', err));
        });
      }
    </script>
  </body>
</html>
